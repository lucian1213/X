<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>남극지점 X · GM 콘솔</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Nanum+Myeongjo:wght@700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0a0f14; --panel:#0e151d; --panel2:#101a24;
    --line:#1c2a36; --lineSoft:#152029;
    --frost:#d6e9f2; --dim:#6f8595; --dimmer:#47596a;
    --cyan:#54cfe0; --safe:#46b7a6; --warn:#d7a13f;
    --danger:#e2574c; --crimson:#a83244;
    --mono:ui-monospace,'SF Mono',Menlo,Consolas,monospace;
    --sans:'Noto Sans KR','Apple SD Gothic Neo',system-ui,sans-serif;
  }
  *{box-sizing:border-box}
  html,body{margin:0}
  body{background:var(--bg);color:var(--frost);font-family:var(--sans);padding:18px 16px 44px;-webkit-font-smoothing:antialiased}
  .wrap{max-width:1400px;margin:0 auto}
  h1{margin:0;font-weight:800;letter-spacing:-.5px}
  h2{margin:0;font-size:12.5px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--frost)}
  h3{margin:0 0 9px;font-size:13px;font-weight:700;letter-spacing:1px;color:var(--cyan)}
  .eyebrow{display:flex;align-items:center;gap:7px;color:var(--cyan);font-family:var(--mono);font-size:10.5px;letter-spacing:3px;text-transform:uppercase}
  .btn{display:inline-flex;align-items:center;gap:5px;background:transparent;border:1px solid var(--line);color:var(--dim);font-size:12px;font-family:var(--sans);padding:5px 10px;border-radius:7px;cursor:pointer}
  .btn:hover{border-color:var(--dim)}
  .saved{font-family:var(--mono);font-size:10px;color:var(--dimmer);transition:color .3s}
  .saved.on{color:var(--safe)}
  svg{display:block}

  .topbar{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:18px}
  .topbar .l{display:flex;align-items:center;gap:12px;min-width:0}
  .topbar .title{font-size:18px;font-weight:800;letter-spacing:-.3px}
  .topbar .kicker{font-family:var(--mono);font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--dimmer)}

  /* 홈 */
  .hero{padding:26px 4px 28px}
  .hero .brand{font-size:40px;font-weight:800;letter-spacing:-1.5px;line-height:1}
  .hero .sub{color:var(--dim);margin-top:10px;font-size:14px;max-width:520px;line-height:1.6}
  .menu{display:grid;grid-template-columns:repeat(auto-fit,minmax(224px,1fr));gap:14px}
  .mcard{position:relative;background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:22px 20px 18px;cursor:pointer;overflow:hidden;transition:border-color .2s,transform .12s}
  .mcard:hover{border-color:var(--cyan);transform:translateY(-2px)}
  .mcard .rail{position:absolute;left:0;top:0;bottom:0;width:3px}
  .mcard .ic{width:34px;height:34px;border-radius:9px;display:flex;align-items:center;justify-content:center;margin-bottom:15px}
  .mcard .mt{font-size:19px;font-weight:800;letter-spacing:-.3px}
  .mcard .md{color:var(--dim);font-size:12px;margin-top:7px;line-height:1.55}
  .mcard .go{display:inline-flex;align-items:center;gap:5px;margin-top:15px;color:var(--dimmer);font-family:var(--mono);font-size:10px;letter-spacing:2px;text-transform:uppercase}
  .mcard.live .go{color:var(--safe)}

  /* 문서 */
  .doc{max-width:860px;margin:0 auto;display:grid;gap:14px}
  .box{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:16px 18px}
  .box p{margin:0 0 8px;font-size:13.5px;line-height:1.7;color:var(--frost)}
  .box p:last-child{margin-bottom:0}
  .box p.muted{color:var(--dim);font-size:12.5px}
  .box ul{margin:0;padding-left:18px}
  .box li{font-size:13.5px;line-height:1.7;margin-bottom:4px}
  .steps{counter-reset:s;display:grid;gap:9px}
  .step{display:flex;gap:11px;align-items:flex-start}
  .step .n{counter-increment:s;flex-shrink:0;width:22px;height:22px;border-radius:6px;background:#0a1218;border:1px solid var(--line);color:var(--cyan);font-family:var(--mono);font-size:11px;display:flex;align-items:center;justify-content:center}
  .step .n::before{content:counter(s,decimal-leading-zero)}
  .step .t{font-size:13.5px;line-height:1.55;padding-top:1px}
  .step .t b{color:var(--frost)} .step .t span{color:var(--dim);font-size:12px}
  .flow{display:grid;gap:6px}
  .frow{display:flex;justify-content:space-between;gap:12px;font-size:13px;padding:5px 0;border-bottom:1px solid var(--lineSoft)}
  .frow:last-child{border-bottom:none}
  .frow .tm{font-family:var(--mono);color:var(--cyan);flex-shrink:0}
  .phase-tag{display:inline-block;font-family:var(--mono);font-size:10px;letter-spacing:1px;text-transform:uppercase;color:var(--warn);border:1px solid var(--warn)55;background:#1a140a;border-radius:5px;padding:2px 8px;margin:2px 0 8px}
  table.lv{width:100%;border-collapse:collapse;font-size:13px}
  table.lv td{padding:6px 8px;border-bottom:1px solid var(--lineSoft)}
  table.lv tr:last-child td{border-bottom:none}
  table.lv .num{font-family:var(--mono);text-align:right;color:var(--frost);font-weight:700}
  .quote{border-left:2px solid var(--line);padding:9px 0 9px 14px;color:var(--frost);font-size:13px;line-height:1.7;margin:0}
  .exam{border:1px solid var(--lineSoft);border-radius:10px;padding:12px 14px;background:var(--panel2);margin-bottom:9px}
  .exam:last-child{margin-bottom:0}
  .exam .eh{font-size:13px;font-weight:700;margin-bottom:7px}
  .callout{border-left:2px solid var(--warn);background:#1a140a;padding:10px 13px;border-radius:0 8px 8px 0;font-size:12.5px;color:var(--warn);line-height:1.6}
  .callout.red{border-left-color:var(--crimson);background:#1a0e11;color:#e29aa0}
  .callout.safe{border-left-color:var(--safe);background:#0c1614;color:#7fd0c2}
  .branch{display:grid;gap:10px}
  .br{display:flex;gap:12px;align-items:flex-start;padding:11px 12px;border:1px solid var(--lineSoft);border-radius:10px;background:var(--panel2)}
  .br .tag{flex-shrink:0;font-family:var(--mono);font-size:10px;letter-spacing:1px;padding:3px 8px;border-radius:6px}
  .br .bt{font-size:13.5px;line-height:1.55} .br .bt b{color:var(--frost)}

  /* 프롤로그 스크립트 */
  .script{display:grid;gap:11px}
  .snarr{color:var(--dim);font-size:13px;line-height:1.75}
  .sopen{color:var(--frost);font-size:15px;line-height:1.7;font-weight:600;border-left:2px solid var(--cyan);padding-left:14px}
  .sline{display:grid;grid-template-columns:72px 1fr;gap:12px;align-items:start}
  .swho{font-weight:700;font-size:12.5px;text-align:right;padding-top:1px}
  .stext{font-size:13.5px;line-height:1.6;color:var(--frost)}

  /* 콘솔 */
  .cols{display:flex;flex-wrap:wrap;gap:18px;align-items:flex-start}
  main{flex:1 1 620px;min-width:0}
  aside{flex:0 0 306px;position:sticky;top:10px;max-height:calc(100vh - 20px);overflow:auto;display:grid;gap:14px}
  .chargrid{display:grid;grid-template-columns:58px repeat(4,minmax(0,1fr));gap:7px;margin-bottom:18px}
  .colhead{text-align:center;font-family:var(--mono);font-size:11px;color:var(--dim);letter-spacing:1px;padding-bottom:2px}
  .rowlab{display:flex;align-items:center;justify-content:flex-end;padding-right:4px}
  .rowlab .in{display:flex;flex-direction:column;align-items:flex-end;gap:2px}
  .rowlab .nm{font-size:13px;font-weight:700}
  .rowlab .tv{font-family:var(--mono);font-size:11px;color:var(--dimmer)}
  .rowlab .tv.over{color:var(--danger)}
  .grid5{display:grid;grid-template-columns:repeat(5,minmax(0,1fr));gap:7px}
  .sectlab{display:flex;align-items:center;gap:8px;margin:0 0 8px}
  .sectlab span.t{font-family:var(--mono);font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--cyan)}
  .sectlab span.r{flex:1;height:1px;background:var(--lineSoft)}
  .card{background:var(--panel);border:1px solid var(--lineSoft);border-radius:9px;padding:8px 9px 7px;display:flex;flex-direction:column;gap:6px;min-height:92px}
  .card.assigned{border-color:var(--line)}
  .card.inf{background:#150e11;border-color:#e2574c44}
  .card-top{display:flex;align-items:flex-start;justify-content:space-between;gap:6px}
  .card-name{font-size:13px;font-weight:700;line-height:1.25;color:var(--frost)}
  .card-type{font-size:9.5px;color:var(--dimmer);margin-top:2px}
  .badge{flex-shrink:0;font-family:var(--mono);font-size:11px;font-weight:700;color:var(--danger);background:#241014;border:1px solid #e2574c55;border-radius:5px;padding:1px 6px}
  .chips{display:flex;gap:4px;margin-top:auto}
  .chip{flex:1;height:22px;border-radius:5px;font-size:11px;font-weight:700;font-family:var(--sans);cursor:pointer;border:1px solid var(--lineSoft);background:transparent;color:var(--dim);padding:0}
  .chip[disabled]{cursor:not-allowed;opacity:.5;color:var(--lineSoft)}
  .phead{display:flex;align-items:center;gap:7px;margin-bottom:10px;color:var(--cyan)}
  .phead.inline{margin-bottom:0}
  .note{font-size:10.5px;color:var(--dimmer)}
  .gauge{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:9px 11px}
  .gauge.over{background:#1a1013;border-color:#e2574c55}
  .g-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:7px}
  .g-l{display:flex;align-items:center;gap:7px;min-width:0}
  .dot{width:8px;height:8px;border-radius:99px;flex-shrink:0}
  .g-nm{font-size:14px;font-weight:700}
  .flag{font-family:var(--mono);font-size:9px;color:var(--danger);border:1px solid var(--danger);border-radius:4px;padding:0 4px}
  .g-r{display:flex;align-items:baseline;gap:5px}
  .g-parts{font-size:9px;color:var(--dim);font-family:var(--mono)}
  .g-val{font-family:var(--mono);font-size:19px;font-weight:700;min-width:34px;text-align:right}
  .bar{position:relative;height:7px;background:#0a1218;border-radius:99px;overflow:hidden}
  .fill{position:absolute;inset:0;border-radius:99px;transition:width .35s ease,background .3s}
  .tick{position:absolute;top:-2px;bottom:-2px;width:2px;background:var(--frost);opacity:.35}
  .g-base{display:flex;align-items:center;gap:5px;margin-top:6px}
  .g-base label{font-size:9.5px;color:var(--dimmer)}
  .g-base input{width:46px;background:#0a1218;border:1px solid var(--lineSoft);border-radius:4px;color:var(--dim);font-family:var(--mono);font-size:10.5px;padding:1px 5px}
  .segrow{display:flex;gap:5px;align-items:center}
  .seg{min-width:26px;background:transparent;border:1px solid var(--line);color:var(--dim);font-family:var(--mono);font-size:12px;padding:2px 0;border-radius:5px;cursor:pointer}
  .seg.on{background:var(--cyan);color:var(--bg);border-color:var(--cyan)}
  .counts{font-family:var(--mono);font-size:11px;color:var(--dim)}
  .counts b.hot{color:var(--danger)}
  .pillrow{display:flex;gap:6px;flex-wrap:wrap}
  .pill{display:inline-flex;align-items:center;gap:5px;border:1px solid;border-radius:99px;padding:5px 11px;font-size:12px;font-family:var(--sans);background:transparent;cursor:pointer;color:var(--frost)}
  .pill[disabled]{cursor:not-allowed;opacity:.4;background:var(--lineSoft);color:var(--dimmer)}
  .pill .pd{width:6px;height:6px;border-radius:99px}
  .pill .p1{color:var(--dim);font-family:var(--mono)}
  .pill.cured{border-color:var(--safe);background:#46b7a622;color:var(--safe)}
  .log{display:flex;flex-wrap:wrap;gap:5px}
  .logc{display:inline-flex;align-items:center;gap:5px;border:1px solid;border-radius:6px;padding:2px 4px 2px 7px;font-size:11px;background:var(--panel2)}
  .logc .i{color:var(--dimmer);font-family:var(--mono);font-size:9px}
  .x{display:inline-flex;align-items:center;background:transparent;border:none;color:var(--dimmer);cursor:pointer;padding:1px}
  .foot{margin:22px auto 0;font-size:10.5px;color:var(--dimmer);line-height:1.7}
  .fsbtn{position:fixed;bottom:16px;right:16px;z-index:60;width:40px;height:40px;border-radius:10px;
    background:var(--panel);border:1px solid var(--line);color:var(--dim);display:flex;align-items:center;
    justify-content:center;cursor:pointer;box-shadow:0 4px 16px rgba(0,0,0,.4)}
  .fsbtn:hover{border-color:var(--cyan);color:var(--frost)}
  @media(max-width:720px){ .hero .brand{font-size:32px} .sline{grid-template-columns:60px 1fr} }

  /* 카드 앞면 이미지 타일 */
  .card{padding:0;overflow:hidden;gap:0;min-height:0}
  
  .cimg img{width:100%;height:100%;object-fit:cover;display:block}
  .card .badge{position:absolute;top:6px;right:6px}
  .cmeta{padding:6px 8px 0}
  .cname{font-size:12px;font-weight:700;color:var(--frost);line-height:1.25;display:block}
  .ctype{font-size:9px;color:var(--dimmer);display:block;margin-top:1px}
  .card .chips{padding:6px 8px 8px}
  .card.inf{border-color:#e2574c55}
  .card.inf .cimg{box-shadow:inset 0 0 0 1px #e2574c33}


  /* 엔딩 낭독 UI */
  .epath{display:flex;flex-wrap:wrap;gap:6px;align-items:center;font-size:11.5px;color:var(--dim)}
  .epath em{color:var(--dimmer);font-style:normal}
  .epath span{white-space:nowrap}
  .stg{display:flex;align-items:center;gap:9px;margin-bottom:10px}
  .stg .sn{flex-shrink:0;width:24px;height:24px;border-radius:7px;background:#0a1218;border:1px solid var(--line);
    color:var(--cyan);font-size:12px;display:flex;align-items:center;justify-content:center}
  .stg h3{color:var(--frost);letter-spacing:.5px}
  .gmnote{border-left:2px solid var(--dimmer);background:#0c1218;color:var(--dim);font-size:12px;
    line-height:1.65;padding:8px 12px;border-radius:0 7px 7px 0;margin:0 0 10px}
  details.read{border:1px solid var(--lineSoft);border-radius:10px;background:var(--panel2);margin-bottom:9px;overflow:hidden}
  details.read:last-child{margin-bottom:0}
  details.read summary{cursor:pointer;list-style:none;padding:11px 13px;font-size:13px;color:var(--dim);
    display:flex;align-items:center;gap:9px;user-select:none}
  details.read summary::-webkit-details-marker{display:none}
  details.read summary::after{content:"▾";margin-left:auto;color:var(--dimmer);transition:transform .18s}
  details.read[open] summary::after{transform:rotate(180deg)}
  details.read[open] summary{border-bottom:1px solid var(--lineSoft);color:var(--frost)}
  .tag{flex-shrink:0;font-family:var(--mono);font-size:10px;letter-spacing:1px;padding:3px 8px;border-radius:6px;border:1px solid}
  .tcyan{color:var(--cyan);border-color:#54cfe055;background:#54cfe014}
  .tsafe{color:var(--safe);border-color:#46b7a655;background:#46b7a614}
  .twarn{color:var(--warn);border-color:#d7a13f55;background:#d7a13f14}
  .tred{color:var(--danger);border-color:#e2574c55;background:#e2574c14}
  .rt{padding:13px 15px 14px}
  .rt p{margin:0 0 12px;font-size:14px;line-height:1.95;color:var(--frost)}
  .rt p:last-child{margin-bottom:0}
  .rt .say{border-left:2px solid var(--line);padding-left:12px}
  .rt .say{margin-bottom:9px}
  .gmin{color:var(--dimmer);font-size:12px}
  .rt .fin{color:var(--dim);font-size:12.5px;letter-spacing:1px;text-align:center;margin-top:14px}
  .rt .gmnote{margin:10px 0 0}
  /* CSS 카드 앞면 */
  .cface{position:relative;width:100%;height:84px;display:flex;flex-direction:column;
    align-items:center;justify-content:center;gap:2px;overflow:hidden}
  .fc{position:absolute;width:16px;height:16px;border:0 solid var(--fr, #ffffff77);
    background:none;padding:0;border-radius:0}
  .fc.ktl{top:7px;left:7px;border-top-width:2px;border-left-width:2px}
  .fc.ktr{top:7px;right:7px;border-top-width:2px;border-right-width:2px}
  .fc.kbl{bottom:7px;left:7px;border-bottom-width:2px;border-left-width:2px}
  .fc.kbr{bottom:7px;right:7px;border-bottom-width:2px;border-right-width:2px}
  .fno{position:absolute;top:5px;left:11px;font-family:Georgia,'Times New Roman',serif;
    font-size:10px;color:#ffffff66;font-weight:700}
  .flab{font-family:var(--mono);font-size:7.5px;letter-spacing:2.5px;text-transform:uppercase;opacity:.85}
  .fname{font-family:'Nanum Myeongjo','Noto Serif KR','Apple Myungjo',Batang,serif;
    font-size:21px;font-weight:800;color:#f4f8fa;line-height:1.05;letter-spacing:2px;
    text-shadow:0 1px 6px rgba(0,0,0,.5)}
  .fsub{font-size:9px;color:#ffffff9e;letter-spacing:.5px;max-width:92%;white-space:nowrap;
    overflow:hidden;text-overflow:ellipsis}
  /* 컴팩트 카드 (한 화면 맞춤) */
  .card{padding:0;overflow:hidden;gap:0;min-height:0;border-radius:3px}
  .cimg{position:relative;width:100%;aspect-ratio:4/3;background:#0a0f14}
  
  .card .badge{position:absolute;top:5px;right:5px;font-size:10px;padding:0 5px;z-index:2}

  .card .chips{padding:5px 6px 6px;gap:4px;margin:0}
  .card .chip{height:22px;font-size:11px;border-radius:4px}
  .chargrid{gap:5px;margin-bottom:12px}
  .grid5{gap:6px}
  .sectlab{margin-bottom:7px}
  .rowlab .nm{font-size:12px}
  .card.inf{border-color:#e2574c55}
  .card.inf .cface{box-shadow:inset 0 0 0 1px #e2574c40}
</style>

<div class="wrap" id="app"></div>
<button class="fsbtn" id="fs" title="전체화면"></button>

<script>
const THRESHOLD = 10, GAUGE_MAX = 12, PHASES = [1,2];

const ROLES = [
  { id:"soldier",   name:"군인",   ini:"군", base:8,   color:"#d94a3d" },
  { id:"pilot",     name:"조종사", ini:"조", base:2,   color:"#4faf74" },
  { id:"mechanic",  name:"기술자", ini:"기", base:2,   color:"#d6b13f" },
  { id:"scientist", name:"연구자", ini:"연", base:3,   color:"#9d6fd1" },
  { id:"doctor",    name:"의사",   ini:"의", base:100, color:"#4f93d4", culprit:true },
];
const roleById = Object.fromEntries(ROLES.map(r => [r.id, r]));

const CHAR = {
  soldier:[["No.1","군인의 상태","정보",0],["No.2","화염방사기","아이템",0],["No.3","버려진 군복","정보",1],["No.4","팔의 물린 상처","정보",0]],
  pilot:[["No.1","교수와의 관계","정보",0],["No.2","차가워진 몸","정보",0],["No.3","은색 라이터","아이템",1],["No.4","오두막의 사진","아이템",0]],
  mechanic:[["No.1","조종 면허","정보",0],["No.2","피에 젖은 수기","아이템",1],["No.3","열쇠","아이템",0],["No.4","격납고로 향한 발자국","정보",0]],
  scientist:[["No.1","연구 기록","정보",0],["No.2","조직의 일부","아이템",2],["No.3","당일의 행동","정보",0],["No.4","유리병","아이템",0]],
  doctor:[["No.1","연구 기록","정보",0],["No.2","신체검사 키트","정보",0],["No.3","약품 Y","아이템",2],["No.4","흰 가운","정보",0]],
};
const PLACE = [["격납고",0],["샤워실",0],["연구실",0],["통신실",0],["오두막",0]];
const SECRET = [["숨겨진 소사체","격납고",3],["배수구","샤워실",2],["감염 치료","연구실",2],["남겨진 기록","통신실",1],["머리만 남은 괴물","오두막",5]];


function buildCards(){
  const out = [];
  ROLES.forEach(r => CHAR[r.id].forEach(([slot,name,type,val]) =>
    out.push({ id:`${r.id}_${slot}`, group:"char", owner:r.id, slot, name, type, val, invs:[] })));
  PLACE.forEach(([name,val],i) => out.push({ id:`place_${i}`, group:"place", owner:null, type:"장소", name, val, invs:[] }));
  SECRET.forEach(([name,sub,val],i) => out.push({ id:`secret_${i}`, group:"secret", owner:null, type:"시크릿", name, sub, val, invs:[] }));
  return out;
}

const STORE_KEY = "antarctic_gm_app_v2";
const uid = () => Math.random().toString(36).slice(2,8);
const esc = s => String(s).replace(/[&<>"]/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));

const backend = (typeof window.storage !== "undefined" && window.storage && typeof window.storage.get === "function")
  ? { get: async k => { try{ const r = await window.storage.get(k); return r ? r.value : null; }catch(e){ return null; } },
      set: async (k,v) => { try{ await window.storage.set(k,v); }catch(e){} } }
  : { get: async k => { try{ return localStorage.getItem(k); }catch(e){ return null; } },
      set: async (k,v) => { try{ localStorage.setItem(k,v); }catch(e){} } };

let state = { screen:"home", cards:buildCards(), baseOv:{}, meetings:[], phase:1, cure:null };
let ready = false, saveTimer;

async function load(){
  const raw = await backend.get(STORE_KEY);
  if(raw){ try{
    const s = JSON.parse(raw);
    if(s.screen) state.screen = s.screen;
    if(s.cards){ const inv = Object.fromEntries(s.cards.map(c => [c.id, c.invs || []]));
      state.cards = buildCards().map(c => ({ ...c, invs: inv[c.id] || [] })); }
    if(s.baseOv) state.baseOv = s.baseOv;
    if(s.meetings) state.meetings = s.meetings;
    if(typeof s.phase === "number") state.phase = s.phase;
    if("cure" in s) state.cure = s.cure;
  }catch(e){} }
  if(!PHASES.includes(state.phase)) state.phase = 1;
  ready = true; render();
}
async function save(){
  if(!ready) return;
  await backend.set(STORE_KEY, JSON.stringify(state));
  const el = document.getElementById("saved");
  if(el){ el.textContent = "저장됨"; el.classList.add("on");
    clearTimeout(saveTimer); saveTimer = setTimeout(() => { el.textContent = "자동 저장"; el.classList.remove("on"); }, 1100); }
}

const baseOf = r => (r.id in state.baseOv) ? state.baseOv[r.id] : r.base;
function totals(){
  return ROLES.map(r => {
    const base = baseOf(r);
    const cardSum = state.cards.reduce((a,c) => a + (c.invs.includes(r.id) ? c.val : 0), 0);
    const meetSum = state.meetings.filter(m => m.target === r.id).length;
    const cureAmt = state.cure === r.id ? -8 : 0;
    return { ...r, base, cardSum, meetSum, cureAmt, total: base + cardSum + meetSum + cureAmt };
  });
}
const meetingsThisPhase = () => state.meetings.filter(m => m.phase === state.phase).length;
const lastTarget = () => state.meetings.length ? state.meetings[state.meetings.length-1].target : null;
function canMeet(tid){
  if(state.meetings.length >= 10) return { ok:false, why:"전체 10회 상한" };
  if(meetingsThisPhase() >= 5) return { ok:false, why:"이번 조사 5회 상한" };
  if(tid === lastTarget()) return { ok:false, why:"직전과 동일 (연속 금지)" };
  return { ok:true };
}

      <div class="gmnote">본부행 플레이어와 단둘이 밀담 공간으로 이동. GM이 ‘본부 책임자’가 되어 모니터 너머의 목소리처럼 직접 전달. 감염 레벨 10 이하 → 아래 항목 전달 + ‘완전 치료제’ 카드 4장 지급. 10 초과 → 항목을 전하지 말고 곧바로 ‘파멸’ 단락으로.</div>

      <details class="read"><summary><b class="tag tsafe">감염 10 이하</b> 본부 책임자로서 직접 전달 + 치료제 4장</summary><div class="rt">
        <p class="say">기지 안에서 무슨 일이 벌어졌는지는, 우리도 대략 짐작하고 있다.</p>
        <p class="say">안심해라. 당신은 이미 치료를 마쳤다. 현재 당신의 감염 레벨은 0이다.</p>
        <p class="say">하지만 일은 아직 끝나지 않았다. 한 번 더 기지로 돌아가, 가능한 한 많은 대원을 데리고 와 주길 바란다.</p>
        <p class="say">데려올 사람에게는 반드시 이 완전 치료제를 먹여라. <span class="gmin">(여기서 ‘완전 치료제’ 카드 4장을 건넨다)</span></p>
        <p class="say">다만 명심해라. 완전 치료제조차, 이미 발병해 버린 자에게는 듣지 않는다.</p>
        <p class="say">최악의 경우 — 아무도 데려오지 못해도 좋다. 당신 한 사람이라도 무사하면 된다.</p>
        <p class="say">서둘러라. 머지않아 그 기지에는 핵미사일이 떨어질 것이다. 모든 것이 불길에 휩싸여, 흔적도 없이 소독될 것이다.</p>
      </div></details>

      <details class="read"><summary><b class="tag tred">감염 10 초과 — 파멸</b> 게임 종료</summary><div class="rt">
        <p>헬리콥터가 본부를 향해 날아가는 동안, 당신은 처음으로 그것을 느꼈다. 피부 아래에서 무언가가 꿈틀거린다. 뼈가 어긋나고, 살이 비틀리고, 익숙했던 몸이 더 이상 자신의 것이 아니게 되어 간다. 그리고 마침내 당신은 자각한다 — 자신은 이미, 한참 전부터 인간이 아니었다는 것을.</p>
        <p>기체가 착륙하고, 마중 나온 본부의 인간들이 다가온다. 그들이 미처 비명을 지르기도 전에, 당신 안의 ‘그것’이 터져 나온다. 본부의 인간들은 남김없이 포식되었다. 그리고 새로운 육체와 새로운 굶주림을 얻은 당신은, 다음 먹잇감을 찾아 본토를 향해 나아간다. 한편, 기지에 남겨진 이들은 끝내 누구의 구조도 받지 못한 채 — 끝없는 추위와 절망 속에서, 한 사람씩, 또 한 사람씩, 천천히 ‘물체 X’가 되어 갔다. 그들의 비명을 들어 줄 사람은, 이제 이 세상 어디에도 없었다.</p>
        <p class="fin">— 이 시점에서 게임은 종료됩니다. —</p>
      </div></details>
    </div>

    <!-- ④ -->
    <div class="box">
      <div class="stg"><span class="sn">④</span><h3 style="margin:0">기지에 남은 자들 — 남겨진 자들의 의심</h3></div>
      <div class="gmnote">본부행 플레이어에게는 전달 금지. 컨테이너는 핵폭발에도 견딤. 화염방사기 소지자는 남은 자들 중 한 명을 ‘소각’해 처분 가능 — 상의는 가능하되 30초 이내 결정.</div>

      <details class="read"><summary><b class="tag tcyan">남은 자들에게 들려줄 때</b></summary><div class="rt">
        <p>헬리콥터가 한 사람을 싣고 떠난 뒤, 격납고에는 다시 무거운 침묵이 내려앉는다. 남겨진 넷은 서로의 얼굴을 마주 본다. 정말로, 저 컨테이너 안에 갇힌 자만이 ‘그것’이었을까. 우리는 옳은 자를 가두었을까. 아니면 — 진짜 괴물은, 지금 이 침묵 속에서 함께 숨 쉬고 있는 걸까.</p>
        <p>의심은 추위보다 빠르게 번진다. 곁에 선 동료의 숨소리가, 조금 전까지는 아무렇지 않던 그 소리가, 지금은 어딘가 낯설게 들린다. 손에 화염방사기를 쥔 자가 있다면 — 그 무게가 오늘따라 유난히 무겁게 느껴질 것이다. 한 번의 결단이, 동료를 구할 수도, 무고한 인간을 재로 만들 수도 있다.</p>
        <div class="gmnote">소각을 결정했다면 30초 안에 정하게 하고, 그 처분을 묘사합니다.</div>
      </div></details>

      <details class="read"><summary><b class="tag tred">감염 10 초과자가 격리도 소각도 안 된 경우</b></summary><div class="rt">
        <p>마지막 의심이 채 가시기도 전이었다. 그자의 입이, 사람이라면 결코 벌어질 수 없는 각도로 찢어진다. 그 안쪽에서 — 지구상의 온갖 생물을 마구잡이로 뒤섞어 놓은 듯한, 눈을 둘 곳조차 없는 끔찍한 것, ‘물체 X’가 정체를 드러낸다. 저항할 틈도, 비명을 지를 틈도 없었다. 그것은 남은 모두를 한꺼번에 집어삼킨다.</p>
        <p>그리고 잠시 후 — 흩어졌던 살과 뼈가 다시 모여든다. 당신들은 전원, ‘물체 X’로서 하나의 거대한 육체로 재구축된다. 더 이상 ‘나’와 ‘너’의 경계는 없다. 오직 하나의 의지, 하나의 굶주림만이 남는다. 이윽고 구조를 위해 돌아올 헬리콥터에, 한 사람이라도 — 아니, 한 조각이라도 더 많이 올라타기 위해, 당신들은 한마음으로 조용히 때를 기다리기 시작한다.</p>
      </div></details>
    </div>

    <!-- ⑤ -->
    <div class="box">
      <div class="stg"><span class="sn">⑤</span><h3 style="margin:0">재회 — 돌아온 헬리콥터</h3></div>
      <div class="gmnote">전 플레이어 재합류. 본부에서 들은 내용을 어디까지 전할지는 본부행 플레이어의 선택 — 치료제·핵미사일 같은 구체 정보는 GM이 읽지 말고 플레이어끼리 주고받게 하세요. 3분 논의 후, 누구를 데려갈지는 돌아온 플레이어가 최종 결정.</div>

      <details class="read"><summary><b class="tag tcyan">재회 장면</b></summary><div class="rt">
        <p>멀리서, 다시 로터 소리가 들려온다. 처음에는 바람 소리에 묻힐 듯 희미하더니, 이내 또렷해지며 설원 위로 검은 그림자가 내려앉는다. 떠났던 자가, 돌아왔다.</p>
        <p>기체에서 내린 그를, 남겨진 이들이 말없이 바라본다. 그는 무사한 듯 보인다. 그러나 그 표정에서 무엇을 읽어야 할지, 누구도 알 수 없다. 본부에서 무엇을 보고 무슨 말을 들었는지 — 그것을 아는 사람은, 지금 이 자리에 그 한 사람뿐이다. 무엇을 말하고 무엇을 삼킬지는, 오직 그의 입에 달렸다. 짧은 시간이 주어진다. 서로가 가진 조각을 꺼내 맞추든, 감추든, 의심하든. 그리고 마지막에 — 누구를 데리고 이 얼어붙은 땅을 떠날 것인지, 돌아온 자가 결정한다.</p>
      </div></details>
    </div>

    <!-- ⑥ -->
    <div class="box">
      <div class="stg"><span class="sn">⑥</span><h3 style="margin:0">최종 엔딩 — 세 갈래의 결말</h3></div>
      <div class="gmnote">탑승 인원·감염 레벨·컨테이너 잔류 여부로 분기. 여러 조건이 겹치면 해당 단락을 순서대로 읽어 마무리.</div>

      <details class="read"><summary><b class="tag tred">엔딩 A</b> 감염 10 초과자가 헬리콥터에 탑승 (파멸)</summary><div class="rt">
        <p>헬리콥터가 무사히 고도를 올리고, 기지가 발아래 멀어진다. 살아남았다는 안도가 기내에 번지려던, 바로 그때였다. 조종사는 뒤에서 누군가 어깨를 톡, 하고 두드리는 것을 느낀다. 별생각 없이 고개를 돌린 그곳에 — 데려가려던 동료의 얼굴은 없었다. 대신, 천장까지 가득 채운 ‘물체 X’의 거대한 몸뚱이가, 수십 개의 눈으로 그를 내려다보고 있었다.</p>
        <p>소리를 지를 틈조차 없었다. 비좁은 기내에서, 도망칠 곳은 어디에도 없었다. 한 사람씩, 차례로 삼켜진다. 그리고 마지막 남은 한 사람마저 사라졌을 때 — 헬리콥터 안에는, 이제 단 하나의 존재만이 남았다. 진정으로 한 몸이 된 그것은, 인간의 기억과 인간의 얼굴을 가면처럼 두른 채, 끝없이 펼쳐진 인간의 세계를 — 그 따뜻하고, 무방비하고, 셀 수 없이 많은 먹잇감의 땅을 — 향해, 조용히 기수를 돌린다. 본토는, 아직 아무것도 모른다.</p>
      </div></details>

      <details class="read"><summary><b class="tag tsafe">엔딩 B</b> 감염 10 초과자가 타지 않음 (생환)</summary><div class="rt">
        <p>헬리콥터가 본부의 활주로에 내려앉자, 방호복을 입은 무리가 신중하게 당신들을 에워싼다. 차가운 약품이 온몸에 뿌려지고, 한 사람 한 사람 격리되어, 길고 철저한 검사가 시작된다. 며칠이 걸렸는지도 모른다. 그러나 마침내 — 모든 검사를 통과한 당신들에게, 본부는 ‘이상 없음’을 통보한다.</p>
        <p>대가는 침묵이었다. 그곳에서 보고 겪은 모든 것을 결코 발설하지 않는다는 조건으로, 당신들은 한 사람당 3억 엔이라는 거액을 손에 쥐었다. 감시의 눈길은 아마 평생 따라붙을 것이다. 그래도 당신들은 살아남았다. 다시 인간의 거리, 인간의 소음, 인간의 온기 속으로 — 천천히, 그러나 분명히, 돌아간다. 다만 가끔, 추운 밤이면 문득 떠오를 것이다. 그 새하얀 설원과, 강철 컨테이너의 무게와, 끝내 데려오지 못한 누군가의 마지막 표정이. 그것은 평생, 당신들만이 아는 비밀로 남을 것이다.</p>
      </div></details>

      <details class="read"><summary><b class="tag twarn">엔딩 C</b> 컨테이너에 남겨진 자가 있음 (새로운 남극지점 X)</summary><div class="rt">
        <p>…한편 그 무렵, 기지에는 예고된 대로 핵미사일이 떨어졌다. 눈을 멀게 하는 섬광과 함께, 건물도, 시체도, 흔적도, 모든 것이 불길 속에서 소독되어 간다. 가까스로 형체를 유지하던 것들마저 남극의 두꺼운 얼음에 구멍을 뚫고 가라앉아, 이윽고 새하얀 침묵 아래로 전부 파묻혀 간다.</p>
        <p>그러나 — 당신들은, 알고 있을 것이다. 오직 그 컨테이너만은, 핵폭발조차 견뎌내도록 만들어졌다는 것을. 그 안에 갇힌 채 잊혀진 자는, 마지막 숨이 끊어지기 직전에 발병하여, 천천히 ‘물체 X’가 될 것이다. 그리고 — 다시, 잠에 든다. 얼음과 어둠과 강철에 둘러싸인 채로, 영원에 가까운 시간을. 언젠가, 먼 훗날, 누군가가 이 얼어붙은 땅을 다시 찾아와 그 컨테이너를 발견하고, 호기심에 이끌려 그 문을 여는 — 바로 그날까지.</p>
        <p>그렇다. 이곳이, 새로운 ‘남극지점 X’가 되는 것이다.</p>
        <div class="gmnote">원래부터 ‘물체 X’였던 의사가 컨테이너에 남겨진 경우에도, 같은 결말을 낭독합니다.</div>
      </div></details>
    </div>

    <!-- 마무리 -->
    <div class="box">
      <div class="stg"><span class="sn">✦</span><h3 style="margin:0">낭독을 마치며</h3></div>
      <div class="rt" style="margin-top:4px">
        <p>이야기는 끝났습니다. 이제 비밀 공개의 시간입니다. 각 플레이어에게 자신의 목표를 이뤘는지 차례로 발표하게 하고, 어떻게 하면 ‘물체 X’의 정체에 다다를 수 있었는지 — 그 추리의 길을 함께 천천히 되짚어 주세요. 누가 이기고 누가 졌든, 이 두 시간 동안 다섯 사람이 함께 엮어낸 이야기는 오직 이 자리에만 존재하는 단 하나의 결말입니다. 승자에게는 납득을, 패자에게는 꽃을. 그것이 이 차갑고 긴 이야기를 닫는, 가장 따뜻한 방법입니다.</p>
      </div>
    </div>
  </div>`;
  return stages;
}

// ── 현황판 ──
const FACE = {
  soldier:  { in:"#5c1712", out:"#2a0a07", tint:"#e8b0a5", label:"CHARACTER CARD" },
  pilot:    { in:"#17452b", out:"#08200f", tint:"#a9d8b4", label:"CHARACTER CARD" },
  mechanic: { in:"#4c3f14", out:"#241d08", tint:"#e3d49a", label:"CHARACTER CARD" },
  scientist:{ in:"#4a1840", out:"#240a1f", tint:"#e2aed6", label:"CHARACTER CARD" },
  doctor:   { in:"#153455", out:"#081726", tint:"#a9c8e6", label:"CHARACTER CARD" },
  place:    { in:"#1d2026", out:"#101214", tint:"#9aa6b0", label:"PLACE · 장소 카드" },
  secret:   { in:"#171a20", out:"#0b0d10", tint:"#8a97a4", label:"SECRET" },
};
function cardHTML(c){
  const inf = c.val > 0;
  const cls = "card" + (inf ? " inf" : (c.invs.length ? " assigned" : ""));
  const badge = inf ? `<span class="badge">+${c.val}</span>` : "";
  const f = c.group === "char" ? FACE[c.owner] : FACE[c.group];
  const big = c.group === "char" ? roleById[c.owner].name : c.name;
  const sub = c.group === "char" ? esc(c.name) : (c.group === "secret" && c.sub ? esc(c.name) : "");
  const no  = c.group === "char" ? `<span class="fno">${c.slot}</span>` : "";
  const chips = ROLES.map(r => {
    const on = c.invs.includes(r.id), own = c.owner === r.id;
    const st = on ? `background:${r.color};border-color:${r.color};color:#0a0f14` : "";
    return `<button class="chip" data-card="${c.id}" data-role="${r.id}" ${own?"disabled":""} title="${own?"자신의 카드":esc(r.name)}" style="${st}">${r.ini}</button>`;
  }).join("");
  return `<div class="${cls}">
    <div class="cface" style="background:radial-gradient(ellipse at 50% 42%, ${f.in}, ${f.out});--fr:${f.tint}88" title="${esc(c.name)}">
      <i class="fc ktl"></i><i class="fc ktr"></i><i class="fc kbl"></i><i class="fc kbr"></i>
      ${no}${badge}
      <span class="flab" style="color:${f.tint}">${f.label}</span>
      <span class="fname">${esc(big)}</span>
      ${sub ? `<span class="fsub">${sub}</span>` : ""}
    </div>
    <div class="chips">${chips}</div></div>`;
}
function renderMain(){
  const T = Object.fromEntries(totals().map(t => [t.id, t]));
  let grid = `<div></div>` + ["No.1","No.2","No.3","No.4"].map(h => `<div class="colhead">${h}</div>`).join("");
  ROLES.forEach(r => {
    const t = T[r.id], over = t.total >= THRESHOLD && !r.culprit;
    grid += `<div class="rowlab"><div class="in"><span class="nm" style="color:${r.color}">${r.name}</span>
      <span class="tv${over?" over":""}">${t.total}</span></div></div>`;
    state.cards.filter(c => c.owner === r.id).forEach(c => grid += cardHTML(c));
  });
  const place = state.cards.filter(c => c.group === "place").map(cardHTML).join("");
  const secret = state.cards.filter(c => c.group === "secret").map(cardHTML).join("");
  const el = document.getElementById("main");
  if(el) el.innerHTML = `<div class="chargrid">${grid}</div>
     <div class="sectlab"><span class="t">장소 카드</span><span class="r"></span></div>
     <div class="grid5" style="margin-bottom:16px">${place}</div>
     <div class="sectlab"><span class="t">시크릿 카드</span><span class="r"></span></div>
     <div class="grid5">${secret}</div>`;
}
function gaugeHTML(p){
  const culprit = p.culprit;
  const pct = culprit ? 100 : Math.min(100, (p.total / GAUGE_MAX) * 100);
  const over = !culprit && p.total >= THRESHOLD;
  const near = !culprit && p.total >= THRESHOLD-2 && p.total < THRESHOLD;
  const fill = culprit ? "var(--crimson)" : over ? "var(--danger)" : near ? "var(--warn)" : "var(--safe)";
  const parts = [];
  if(p.cardSum) parts.push(`카드+${p.cardSum}`);
  if(p.meetSum) parts.push(`밀담+${p.meetSum}`);
  if(p.cureAmt) parts.push(`치료${p.cureAmt}`);
  return `<div class="gauge${over?" over":""}"><div class="g-top">
      <div class="g-l"><span class="dot" style="background:${p.color}"></span>
        <span class="g-nm">${p.name}</span>${over?`<span class="flag">발병</span>`:""}</div>
      <div class="g-r">${parts.length?`<span class="g-parts">${parts.join(" ")}</span>`:""}
        <span class="g-val" style="color:${fill}">${p.total}</span></div></div>
    <div class="bar"><div class="fill" style="width:${pct}%;background:linear-gradient(90deg, ${fill}66, ${fill})"></div>
      ${culprit?"":`<div class="tick" style="left:${(THRESHOLD/GAUGE_MAX)*100}%"></div>`}</div>
    <div class="g-base"><label>초기</label><input type="number" data-base="${p.id}" value="${p.base}"></div></div>`;
}
function renderAside(){
  const T = totals(), mp = meetingsThisPhase(), tot = state.meetings.length;
  const gauges = T.map(gaugeHTML).join("");
  const segs = PHASES.map(n => `<button class="seg${state.phase===n?" on":""}" data-phase="${n}">${n}</button>`).join("");
  const targetBtns = ROLES.filter(r => !r.culprit).map(r => {
    const m = canMeet(r.id);
    return `<button class="pill" data-meet="${r.id}" ${m.ok?"":"disabled"} title="${m.ok?"":m.why}" style="border-color:${r.color}66">
      <span class="pd" style="background:${r.color}"></span>${r.name} <span class="p1">+1</span></button>`;
  }).join("");
  const logHTML = state.meetings.map((m,i) => {
    const r = roleById[m.target];
    return `<span class="logc" style="border-color:${r.color}55"><span class="i">${i+1}·${m.phase}</span>
      <span style="color:${r.color}">${r.name}</span><button class="x" data-unmeet="${m.id}">${IC.x}</button></span>`;
  }).join("");
  const cureBtns = ROLES.filter(r => !r.culprit).map(r => {
    const on = state.cure === r.id;
    return `<button class="pill${on?" cured":""}" data-cure="${r.id}" style="${on?"":`border-color:${r.color}66`}">${on?"✓ ":""}${r.name}</button>`;
  }).join("");
  const el = document.getElementById("aside");
  if(el) el.innerHTML = `
    <div><div class="phead">${IC.monitor}<h2>수치 현황</h2></div>
      <div style="display:grid;gap:8px">${gauges}</div></div>
    <div class="box"><div class="phead inline">${IC.syr}<h2>의사 밀담</h2></div>
      <div class="note" style="margin:2px 0 11px">단둘이 밀담 → 대상 +1 · 조사당 5 · 전체 10 · 연속 금지</div>
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
        <div class="segrow"><span style="font-size:11px;color:var(--dim)">조사</span>${segs}</div>
        <div class="counts"><b class="${mp>=5?"hot":""}">${mp}/5</b>
          <span style="color:var(--lineSoft);margin:0 6px">·</span><b class="${tot>=10?"hot":""}">${tot}/10</b></div></div>
      <div class="pillrow" style="${state.meetings.length?"margin-bottom:10px":""}">${targetBtns}</div>
      ${state.meetings.length?`<div class="log">${logHTML}</div>`:""}</div>
    <div class="box"><div class="phead inline">${IC.syr}<h2>감염 치료 (−8)</h2></div>
      <div class="note" style="margin:2px 0 10px">게임 중 1회 · 레벨 17까지인 대원만 구제</div>
      <div class="pillrow">${cureBtns}</div></div>`;
}
function consoleHTML(){
  return `<div class="cols"><main id="main"></main><aside id="aside"></aside></div>
    <div class="foot">카드 아래 <b style="color:var(--dim)">군·조·기·연·의</b> 칩을 눌러 조사자 지정 (둘 누르면 페어).
      감염 카드(붉은 <b style="color:var(--danger)">+N</b>)만 수치에 반영됩니다. GM 전용 — 수치는 플레이어에게 말하지 마세요.</div>`;
}
function renderConsole(){ renderMain(); renderAside(); }

function render(){
  const app = document.getElementById("app");
  if(state.screen === "home"){ app.innerHTML = homeHTML(); return; }
  if(state.screen === "prologue"){ app.innerHTML = topbar("프롤로그") + prologueHTML(); return; }
  if(state.screen === "guide"){ app.innerHTML = topbar("GM 가이드") + guideHTML(); return; }
  if(state.screen === "ending"){ app.innerHTML = topbar("엔딩") + endingHTML(); return; }
  const tools = `<span id="saved" class="saved">자동 저장</span><button class="btn" id="reset">${IC.reset} 초기화</button>`;
  app.innerHTML = topbar("현황판", tools) + consoleHTML();
  renderConsole();
}

document.addEventListener("click", (e) => {
  const t = e.target.closest("[data-nav],[data-card],[data-meet],[data-unmeet],[data-cure],[data-phase],#reset");
  if(!t) return;
  if(t.dataset.nav){ state.screen = t.dataset.nav; window.scrollTo(0,0); render(); save(); return; }
  if(t.id === "reset"){
    if(!confirm("이 세션의 조사·밀담 기록을 초기화할까요? (프롤로그·가이드·엔딩은 그대로)")) return;
    state.cards = buildCards(); state.baseOv = {}; state.meetings = []; state.phase = 1; state.cure = null;
    renderConsole(); save(); return;
  }
  if(t.dataset.card){
    const c = state.cards.find(x => x.id === t.dataset.card), rid = t.dataset.role;
    if(c.owner === rid) return;
    c.invs = c.invs.includes(rid) ? c.invs.filter(x => x !== rid) : [...c.invs, rid];
    if(c.invs.length > 2) c.invs = c.invs.slice(-2);
    renderConsole(); save(); return;
  }
  if(t.dataset.meet){ if(!canMeet(t.dataset.meet).ok) return;
    state.meetings.push({ id:uid(), phase:state.phase, target:t.dataset.meet }); renderConsole(); save(); return; }
  if(t.dataset.unmeet){ state.meetings = state.meetings.filter(m => m.id !== t.dataset.unmeet); renderConsole(); save(); return; }
  if(t.dataset.phase){ state.phase = +t.dataset.phase; renderConsole(); save(); return; }
  if(t.dataset.cure){ state.cure = state.cure === t.dataset.cure ? null : t.dataset.cure; renderConsole(); save(); return; }
});
document.addEventListener("change", (e) => {
  const inp = e.target.closest("[data-base]");
  if(!inp) return;
  state.baseOv[inp.dataset.base] = Number(inp.value) || 0;
  renderConsole(); save();
});

// ── 전체화면 토글 ──
const FS_ENTER = `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8 3H5a2 2 0 0 0-2 2v3M21 8V5a2 2 0 0 0-2-2h-3M3 16v3a2 2 0 0 0 2 2h3M16 21h3a2 2 0 0 0 2-2v-3"/></svg>`;
const FS_EXIT = `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8 3v3a2 2 0 0 1-2 2H3M21 8h-3a2 2 0 0 1-2-2V3M3 16h3a2 2 0 0 1 2 2v3M16 21v-3a2 2 0 0 1 2-2h3"/></svg>`;
const fsBtn = document.getElementById("fs");
fsBtn.innerHTML = FS_ENTER;
fsBtn.addEventListener("click", () => {
  const el = document.documentElement;
  if(document.fullscreenElement){ (document.exitFullscreen || document.webkitExitFullscreen || function(){}).call(document); }
  else { (el.requestFullscreen || el.webkitRequestFullscreen || function(){}).call(el); }
});
document.addEventListener("fullscreenchange", () => { fsBtn.innerHTML = document.fullscreenElement ? FS_EXIT : FS_ENTER; });
document.addEventListener("webkitfullscreenchange", () => { fsBtn.innerHTML = document.fullscreenElement ? FS_EXIT : FS_ENTER; });

load();
</script>
